<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사진 · 주소 매핑 확인 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f5f1e8;
        --ink: #1a2419;
        --muted: #6b7570;
        --rule: #ddd6c8;
        --a: #2d5a3d;
        --b: #8a6a3a;
        --c: #3a5a8a;
        --d: #7a4a6a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans KR", system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.5;
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
      h1 { font-size: 1.5rem; margin: 0 0 0.35rem; }
      .lead { color: var(--muted); margin: 0 0 2rem; max-width: 52rem; }
      .tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
      .tab {
        border: 1px solid var(--rule);
        background: #fff;
        border-radius: 999px;
        padding: 0.45rem 1rem;
        font: inherit;
        cursor: pointer;
      }
      .tab[aria-selected="true"] { background: var(--ink); color: #fff; border-color: var(--ink); }
      .panel[hidden] { display: none; }
      .group {
        background: #fff;
        border: 1px solid var(--rule);
        border-radius: 14px;
        padding: 1.25rem;
        margin-bottom: 1.25rem;
      }
      .group-head {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1rem;
        align-items: baseline;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--rule);
      }
      .group-head h2 { margin: 0; font-size: 1.1rem; }
      .alias { color: var(--muted); font-size: 0.92rem; }
      .badge {
        display: inline-block;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        background: #ebe6dc;
        color: var(--muted);
      }
      .badge--warn { background: #fdebd2; color: #8a5a10; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1rem;
      }
      .card {
        border: 1px solid var(--rule);
        border-radius: 10px;
        overflow: hidden;
        background: #faf8f3;
      }
      .card img { display: block; width: 100%; aspect-ratio: 4/3; object-fit: cover; }
      .card figcaption { padding: 0.65rem 0.75rem 0.75rem; font-size: 0.85rem; }
      .num { font-weight: 700; font-size: 1rem; }
      .note { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }
      .warn-box {
        background: #fff8eb;
        border: 1px solid #e8c98a;
        border-radius: 10px;
        padding: 1rem 1.1rem;
        margin-bottom: 1.5rem;
        font-size: 0.92rem;
      }
      .empty {
        color: var(--muted);
        font-size: 0.92rem;
        padding: 1rem;
        border: 1px dashed var(--rule);
        border-radius: 10px;
        text-align: center;
      }
      .legend { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 2rem; font-size: 0.85rem; color: var(--muted); }
      .legend span::before {
        content: "";
        display: inline-block;
        width: 0.65rem;
        height: 0.65rem;
        border-radius: 2px;
        margin-right: 0.35rem;
        vertical-align: middle;
      }
      .legend .l-a::before { background: var(--a); }
      .legend .l-b::before { background: var(--b); }
      .legend .l-c::before { background: var(--c); }
      .legend .l-d::before { background: var(--d); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>사진 · 주소 매핑 확인</h1>
      <p class="lead">
        파일명 <strong>1~8번</strong> 사진을 주소별로 묶어 보여 드립니다.
        탭에서 <strong>요청하신 배치</strong>와 <strong>표지판·장면 기준(권장)</strong>을 비교해 주세요.
      </p>

      <div class="tabs" role="tablist">
        <button class="tab" role="tab" aria-selected="true" aria-controls="panel-user" id="tab-user">요청하신 배치</button>
        <button class="tab" role="tab" aria-selected="false" aria-controls="panel-rec" id="tab-rec">표지·장면 기준 (권장)</button>
      </div>

      <div id="panel-user" class="panel" role="tabpanel" aria-labelledby="tab-user">
        <div class="warn-box">
          확정 배치입니다. <strong>죽천마루(85)</strong>는 기존 Home_1 사진을 그대로 사용합니다.
        </div>
        <div id="mount-user"></div>
      </div>

      <div id="panel-rec" class="panel" role="tabpanel" aria-labelledby="tab-rec" hidden>
        <div class="warn-box">
          8번 표지판·1·5·6·7번 실내가 같은 한옥(14번)으로 보여 <strong>8번을 14번</strong>에,
          단독 수영장(4번)을 <strong>죽천길 77</strong>에 두는 배치입니다.
        </div>
        <div id="mount-rec"></div>
      </div>

      <div class="legend">
        <span class="l-a">185번길 11 · 언덕 돌담</span>
        <span class="l-b">185번길 14 · 골목 안채</span>
        <span class="l-c">죽천길 77</span>
        <span class="l-d">나머지 (85 죽천마루 / 75 고개 집)</span>
      </div>
    </div>

    <script>
      var BASE = "../Asset/photo-map-preview/";
      var PHOTOS = {
        1: { file: "1______-01abe8b8-88b3-487d-82e6-56d51527a5c8.png", label: "흰색·원목 주방" },
        2: { file: "2______-2ff803e0-6c0e-44e2-9b26-2cf31b0c4a42.png", label: "마당 평상·노란 계단" },
        3: { file: "3______-56a97a94-9d19-43c3-9b68-3befc3d65d71.png", label: "붉은 기와·가마솟 마당" },
        4: { file: "4______-3c0f460a-bc99-4a57-895f-71de72164b9f.png", label: "실내 수영장" },
        5: { file: "5______-5687a37f-bf04-46d9-b389-6486154719e0.png", label: "민트벽·한지 미닫이" },
        6: { file: "6______-a03d3dd8-ec93-4c7c-9fc9-067e9827c2ac.png", label: "하늘색 복도·주방" },
        7: { file: "7______-8ae3febb-8ab8-4115-9418-fab7d712327e.png", label: "꽃벽지·茶室" },
        8: { file: "8______-e251f814-1c39-4b13-bd38-bb8fff3c3a60.png", label: "한옥 외관 (표지 185-14)" },
      };

      var USER_MAP = [
        { address: "죽천길185번길 11", alias: "언덕 돌담", nums: [2, 3] },
        { address: "죽천길185번길 14", alias: "골목 안채", nums: [1, 5, 6, 7] },
        { address: "죽천길 77", alias: "죽천 끝집", nums: [8] },
        { address: "죽천길 75", alias: "고개 집", nums: [4], note: "4번 수영장" },
      ];

      var REC_MAP = [
        { address: "죽천길185번길 11", alias: "언덕 돌담", nums: [2, 3] },
        { address: "죽천길185번길 14", alias: "골목 안채", nums: [1, 5, 6, 7, 8], note: "8번 표지판 185-14" },
        { address: "죽천길 77", alias: "(가명 미정)", nums: [4], note: "실내 수영장" },
        { address: "죽천길 85 / 75", alias: "죽천마루 · 고개 집", nums: [], empty: "이번 8장에 해당 사진 없음" },
      ];

      function card(n, extra) {
        var p = PHOTOS[n];
        return (
          '<figure class="card">' +
          '<img src="' + BASE + p.file + '" alt="' + n + '번 ' + p.label + '" loading="lazy" />' +
          '<figcaption><div class="num">' + n + '번</div><div class="note">' + p.label + (extra ? " · " + extra : "") + "</div></figcaption></figure>"
        );
      }

      function renderGroups(mountId, groups) {
        var html = groups
          .map(function (g) {
            var badges = g.warn ? '<span class="badge badge--warn">' + g.warn + "</span>" : "";
            var body = g.nums.length
              ? '<div class="grid">' + g.nums.map(function (n) { return card(n); }).join("") + "</div>"
              : '<div class="empty">' + (g.empty || "사진 없음") + "</div>";
            return (
              '<section class="group">' +
              '<div class="group-head"><h2>' + g.address + "</h2>" +
              '<span class="alias">' + g.alias + "</span>" + badges +
              (g.note ? '<span class="note">' + g.note + "</span>" : "") +
              "</div>" + body + "</section>"
            );
          })
          .join("");
        document.getElementById(mountId).innerHTML = html;
      }

      renderGroups("mount-user", USER_MAP);
      renderGroups("mount-rec", REC_MAP);

      document.querySelectorAll(".tab").forEach(function (btn) {
        btn.addEventListener("click", function () {
          document.querySelectorAll(".tab").forEach(function (b) {
            b.setAttribute("aria-selected", "false");
          });
          document.querySelectorAll(".panel").forEach(function (p) {
            p.hidden = true;
          });
          btn.setAttribute("aria-selected", "true");
          document.getElementById(btn.getAttribute("aria-controls")).hidden = false;
        });
      });
    </script>
  </body>
</html>
