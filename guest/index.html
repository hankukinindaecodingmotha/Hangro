<!DOCTYPE html>
<!--
  게스트 포털 HTML 패턴
  · data-ga-page → GuestApp.autoBoot() 가 렌더할 페이지 지정
  · #ga-header-mount, #ga-listings 등 id는 guest-app.js 와 쌍 — 변경 시 JS도 수정
  · 스크립트 순서: portal-guard → portal-data → guest-app → autoBoot()
-->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="행로 — 지역 빈집·유휴 시설을 재생한 숙소를 검색하고 예약하세요." />
    <title>숙소 찾기 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/hangro-tokens.css?v=11" />
    <link rel="stylesheet" href="../css/guest-airbnb.css?v=12" />
    <link rel="stylesheet" href="../css/hangro-notify.css?v=1" />
    <script src="../js/portal-guard.js"></script>
  </head>
  <body class="ga-body" data-ga-page="explore">
    <div id="ga-header-mount"></div>
    <main class="ga-main">
      <div class="ga-wrap">
        <div class="ga-hero-compact">
          <h1>지역에 머무는 숙소</h1>
          <p>빈집과 유휴 시설을 재생한 행로 숙소를 검색해 보세요.</p>
        </div>
        <div id="ga-search-mount"></div>
        <h2 class="ga-section-title">숙소 둘러보기</h2>
        <div id="ga-listings" class="ga-listings" aria-live="polite">
          <p class="ga-empty">숙소 목록을 불러오는 중…</p>
        </div>
      </div>
    </main>
    <footer class="ga-footer">
      <div class="ga-wrap">© 행로 — 게스트</div>
    </footer>
<script src="../js/hangro-notify.js?v=1"></script>
<script src="../js/portal-api.js?v=1"></script>
    <script src="../js/portal-data.js?v=12"></script>
    <script src="../js/guest-app.js?v=11"></script>
    <script>GuestApp.autoBoot();</script>
  </body>
</html>
