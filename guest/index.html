<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="행로 — 지역 빈집·유휴 시설을 재생한 숙소를 검색하고 예약하세요." />
    <title>숙소 찾기 — 머무름 · 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/guest-airbnb.css?v=2" />
    <script src="../js/portal-guard.js"></script>
  </head>
  <body class="ga-body">
    <div id="ga-header-mount"></div>
    <main class="ga-main">
      <div class="ga-wrap">
        <div class="ga-hero-compact">
          <h1>지역에 머무는 숙소</h1>
          <p>빈집과 유휴 시설을 재생한 행로의 머무름을 검색해 보세요.</p>
        </div>
        <div id="ga-search-mount"></div>
        <h2 class="ga-section-title">숙소 둘러보기</h2>
        <div id="ga-listings" class="ga-listings" aria-live="polite">
          <p class="ga-empty">숙소 목록을 불러오는 중…</p>
        </div>
      </div>
    </main>
    <footer class="ga-footer">
      <div class="ga-wrap">© 행로 · Hangro — 게스트</div>
    </footer>
    <script src="../js/portal-data.js?v=2"></script>
    <script src="../js/guest-app.js?v=2"></script>
    <script>
      (function () {
        function boot() {
          var list = document.getElementById("ga-listings");
          if (!window.PORTAL_DATA || !window.GuestApp) {
            if (list) {
              list.innerHTML = "<p class=\"ga-empty\">목록을 불러오지 못했습니다. <strong>강력 새로고침</strong>(Mac: Cmd+Shift+R) 후 다시 시도해 주세요.</p>";
            }
            return;
          }
          GuestApp.mountHeader("explore");
          GuestApp.renderExplore();
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", boot);
        } else {
          boot();
        }
      })();
    </script>
  </body>
</html>
