<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="행로 게스트 포털 — 예약·숙소 안내" />
    <title>게스트 홈 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
        <link rel="stylesheet" href="../css/portal.css" />
    <link rel="stylesheet" href="../css/portal-shell.css" />
    <link rel="stylesheet" href="../css/portal-guest.css" />
      <script src="../js/portal-guard.js"></script>
  </head>
  <body class="portal-guest">
        <header class="portal-shell-header">
      <div class="wrap portal-shell-bar">
        <div class="portal-shell-brand">
          <span class="portal-shell-mark" aria-hidden="true"></span>
          <span class="portal-shell-title">머무름</span>
          <span class="portal-shell-role">게스트</span>
        </div>
      </div>
    </header>

    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Guest</p>
        <h1>게스트 홈</h1>
        <p>다가오는 체류와 숙소 안내를 확인합니다.</p>
      </div>
    </div>

    <main class="page-fill">
      <nav class="portal-subnav wrap" aria-label="게스트 메뉴">
        <a href="./" aria-current="page">홈</a>
        <a href="bookings.html">내 예약</a>
        <a href="stay.html">숙소 안내</a>
        <a href="messages.html">문의</a>
      </nav>

      <div class="wrap">
        <div class="portal-grid portal-grid--2" style="margin-bottom: 1.5rem">
          <article class="portal-card">
            <span class="portal-status portal-status--confirmed">다음 체크인</span>
            <h2>첫 번째 유후공간</h2>
            <p>2026-03-20 → 2026-03-22 · 확정</p>
            <div class="portal-card-actions">
              <a class="btn btn-primary" href="booking.html?id=b1">예약 상세</a>
              <a class="btn btn-ghost" href="stay.html">숙소 안내</a>
            </div>
          </article>
          <article class="portal-card">
            <h2>빠른 이동</h2>
            <p>예약 목록, 이용 규칙, 집주인에게 문의하기</p>
            <div class="portal-card-actions">
              <a class="btn btn-ghost" href="bookings.html">내 예약</a>
              <a class="btn btn-ghost" href="messages.html">문의하기</a>
            </div>
          </article>
        </div>

        <h2 class="portal-section-title">최근 문의</h2>
        <div class="portal-card">
          <ul class="portal-list">
            <li>
              <a href="messages.html">체크인 시간 문의</a>
              <span class="meta">2026-03-18 · 미답</span>
            </li>
          </ul>
        </div>
      </div>
    </main>

        <footer class="portal-shell-footer wrap">
      <span>숙소 이용 안내 · 행로</span>
    </footer>
    <script src="../js/demo-portal.js"></script>
  </body>
</html>
