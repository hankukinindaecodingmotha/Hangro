<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>메시지 — 머무름 · 행로</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/guest-airbnb.css" />
<script src="../js/portal-guard.js"></script>
</head>
<body class="ga-body">
<div id="ga-header-mount"></div>
<main class="ga-main"><div class="ga-wrap"><h1 class="ga-section-title">메시지</h1>
<div id="ga-messages-list"></div>
<h2 class="ga-h2">새 문의</h2>
<form id="guest-message-form" class="ga-form">
<label>제목<input name="subject" type="text" required /></label>
<label>내용<textarea name="body" required></textarea></label>
<button type="submit" class="ga-btn ga-btn--primary">보내기 (데모)</button>
</form>
<p id="portal-form-note" hidden style="font-size:0.85rem;color:var(--ga-muted)"></p>
<div id="portal-local-messages"></div></div></main>
<footer class="ga-footer"><div class="ga-wrap">© 행로 · Hangro — 게스트</div></footer>
<script src="../js/portal-data.js"></script>
<script src="../js/portal-ui.js"></script>
<script src="../js/guest-app.js"></script>
<script>
GuestApp.mountHeader("messages");
GuestApp.renderMessages();
</script>
</body>
</html>
