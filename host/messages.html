<!DOCTYPE html>
<html lang="ko">
  <head>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/hangro-tokens.css?v=10" />
<link rel="stylesheet" href="../css/styles.css?v=10" />
<link rel="stylesheet" href="../css/portal.css?v=10" />
<meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문의함 — 집주인 · 행로</title>
<script src="../js/portal-guard.js"></script>
  </head>
  <body class="portal-host" data-ha-page="messages">
        <header class="portal-shell-header">
      <div class="wrap portal-shell-bar">
        <div class="portal-shell-brand">
          <span class="portal-shell-mark" aria-hidden="true"></span>
          <span class="portal-shell-title">집터</span>
          <span class="portal-shell-role">집주인</span>
        </div>
      </div>
    </header>
    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Host</p>
        <h1>문의함</h1>
        <p>게스트·운영팀 메시지에 답변합니다.</p>
      </div>
    </div>
    <main class="page-fill">
      <nav class="portal-subnav wrap">
        <a href="./">홈</a>
        <a href="properties.html">내 숙소</a>
        <a href="bookings.html">예약</a>
        <a href="messages.html" aria-current="page">문의함</a>
      </nav>
      <div class="wrap">
        <div id="host-messages-list" class="portal-card"></div>
        <h2 class="portal-section-title" style="margin-top: 2rem">답변 작성 (데모)</h2>
        <form id="host-message-form" class="portal-form">
          <label for="msg-subject">제목</label>
          <input id="msg-subject" name="subject" type="text" required />
          <label for="msg-body">내용</label>
          <textarea id="msg-body" name="body" required></textarea>
          <button type="submit" class="btn btn-primary">보내기 (데모)</button>
        </form>
        <div id="portal-local-messages" style="margin-top: 1.5rem"></div>
      </div>
    </main>
        <footer class="portal-shell-footer wrap">
      <span>숙소 운영 · 행로</span>
    </footer>
    <script src="../js/portal-data.js?v=10"></script>
    <script src="../js/portal-ui.js?v=10"></script>
    <script src="../js/host-app.js?v=10"></script>
    <script>HostApp.autoBoot();</script>
  </body>
</html>
