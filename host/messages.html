<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문의함 — 집주인 · 행로</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/portal.css" />
  </head>
  <body class="sub portal">
    <header>
      <div class="wrap nav">
        <a href="../index.html" class="logo">행로</a>
        <nav class="nav-links">
          <a href="../guest/">게스트</a>
          <a href="./" aria-current="page">집주인</a>
          <a href="../company/">회사</a>
        </nav>
        <a class="nav-cta" href="../booking.html">상담 예약</a>
      </div>
    </header>
    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Host</p>
        <h1>문의함</h1>
        <p>게스트·운영팀 메시지에 답변합니다.</p>
      </div>
    </div>
    <main class="page-fill">
      <nav class="portal-subnav wrap">
        <a href="./">홈</a>
        <a href="properties.html">내 숙소</a>
        <a href="bookings.html">예약</a>
        <a href="messages.html" aria-current="page">문의함</a>
      </nav>
      <div class="wrap">
        <div id="host-messages-list" class="portal-card"></div>
        <h2 class="portal-section-title" style="margin-top: 2rem">답변 작성 (데모)</h2>
        <form id="host-message-form" class="portal-form">
          <label for="msg-subject">제목</label>
          <input id="msg-subject" name="subject" type="text" required />
          <label for="msg-body">내용</label>
          <textarea id="msg-body" name="body" required></textarea>
          <button type="submit" class="btn btn-primary">보내기 (데모)</button>
        </form>
        <div id="portal-local-messages" style="margin-top: 1.5rem"></div>
      </div>
    </main>
    <footer>
      <div class="wrap footer-inner">
        <span>© 행로 · Hangro Studio</span>
        <span>집주인</span>
      </div>
    </footer>
    <script src="../js/portal-data.js"></script>
    <script src="../js/portal-ui.js"></script>
    <script>
      (function () {
        var D = window.PORTAL_DATA;
        var U = window.PortalUI;
        var ids = D.properties
          .filter(function (p) {
            return p.hostId === D.demoHostId;
          })
          .map(function (p) {
            return p.id;
          });
        var list = D.messagesForPropertyIds(ids);
        document.getElementById("host-messages-list").innerHTML =
          '<ul class="portal-list">' +
          list
            .map(function (m) {
              return (
                "<li><strong>" +
                U.escapeHtml(m.subject) +
                '</strong><span class="meta">' +
                U.escapeHtml(m.fromName) +
                " · " +
                U.statusBadge(m.status) +
                "<br>" +
                U.escapeHtml(m.body) +
                "</span></li>"
              );
            })
            .join("") +
          "</ul>";
        PortalUI.initMessageForm("host-message-form", "host");
      })();
    </script>
  </body>
</html>
