<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>집주인 홈 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/portal.css" />
  </head>
  <body class="sub portal">
    <header>
      <div class="wrap nav">
        <a href="../index.html" class="logo">행로</a>
        <nav class="nav-links" aria-label="포털 이동">
          <a href="../guest/">게스트</a>
          <a href="./" aria-current="page">집주인</a>
          <a href="../company/">회사</a>
          <a href="../demo/">데모</a>
        </nav>
        <a class="nav-cta" href="../booking.html">상담 예약</a>
      </div>
    </header>
    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Host</p>
        <h1>집주인 홈</h1>
        <p>내 숙소·예약·문의를 한곳에서 확인합니다.</p>
      </div>
    </div>
    <main class="page-fill">
      <nav class="portal-subnav wrap" aria-label="집주인 메뉴">
        <a href="./" aria-current="page">홈</a>
        <a href="properties.html">내 숙소</a>
        <a href="bookings.html">예약</a>
        <a href="messages.html">문의함</a>
      </nav>
      <div class="wrap">
        <div class="portal-grid portal-grid--3" style="margin-bottom: 1.5rem">
          <article class="portal-card portal-kpi"><strong>2</strong><span>운영 숙소</span></article>
          <article class="portal-card portal-kpi"><strong>1</strong><span>이번 주 체크인</span></article>
          <article class="portal-card portal-kpi"><strong>2</strong><span>미답 문의</span></article>
        </div>
        <h2 class="portal-section-title">내 숙소</h2>
        <article class="portal-card">
          <h3>첫 번째 유후공간</h3>
          <p>운영 중 · 전남 ○○군</p>
          <div class="portal-card-actions">
            <a class="btn btn-primary" href="properties.html">숙소 관리</a>
            <a class="btn btn-ghost" href="bookings.html">예약 보기</a>
          </div>
        </article>
        <details class="portal-demo-fold" style="margin-top: 2rem">
          <summary>API 데모 연동</summary>
          <section class="demo-panel">
            <p id="demo-api-status" class="demo-api-status">API 확인 중…</p>
            <p style="font-size: 0.82rem; color: var(--text-muted)"><code>python3 demo/server.py</code></p>
            <p style="font-size: 0.88rem">카운터: <code id="demo-counter-display">—</code>
              <button type="button" class="btn btn-ghost" id="demo-counter-btn" style="margin-left: 0.5rem">+1</button></p>
            <form id="demo-inbox-form" class="demo-inbox-form">
              <label for="demo-inbox-text-host">메시지</label>
              <textarea id="demo-inbox-text-host" name="text"></textarea>
              <div class="demo-inbox-actions">
                <button type="submit" class="btn btn-primary">전송</button>
                <button type="button" class="btn btn-ghost" id="demo-inbox-clear">비우기</button>
              </div>
            </form>
            <pre id="demo-messages" class="demo-messages"></pre>
          </section>
        </details>
      </div>
    </main>
    <footer>
      <div class="wrap footer-inner">
        <span>© 행로 · Hangro Studio</span>
        <span>집주인</span>
      </div>
    </footer>
    <script src="../js/demo-portal.js"></script>
  </body>
</html>
