<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="행로 — 프로젝트 위치 지도"
    />
    <title>지도 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      .map-shell {
        border-radius: var(--radius-lg);
        overflow: hidden;
        margin-top: 1.5rem;
        background: var(--paper);
      }

      #map {
        height: min(420px, 55vh);
        width: 100%;
      }

      .leaflet-container {
        font-family: "Noto Sans KR", system-ui, sans-serif;
        background: var(--bg-elevated);
      }

      .haeng-pin {
        position: relative;
        width: 36px;
        height: 44px;
        filter: drop-shadow(0 2px 4px rgba(26, 36, 25, 0.25));
      }

      .haeng-pin-svg {
        display: block;
        width: 36px;
        height: 44px;
      }

      /* Leaflet divIcon anchors bottom center — padding-bottom matches pin tip */
      .haeng-pin-wrap {
        margin-bottom: -4px;
      }

      .map-legend {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .map-legend strong {
        color: var(--text);
      }
    </style>
  </head>
  <body class="sub">
    <header>
      <div class="wrap nav">
        <a href="index.html" class="logo">행로</a>
        <nav class="nav-links" aria-label="주요 메뉴">
          <a href="index.html">소개</a>
          <a href="map-demo.html" aria-current="page">지도</a>
          <a href="booking.html">예약</a>
          <a href="team.html">팀</a>
        </nav>
        <a class="nav-cta" href="booking.html">상담 예약</a>
      </div>
    </header>

    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Map · 프로젝트 위치</p>
        <h1>행로가 다시 켠 공간들.</h1>
        <p>
          현재 진행 중인 프로젝트의 위치입니다. 핀을 눌러 공간 정보를 보고,
          상세 페이지에서 변경 전·후를 확인하세요.
        </p>
      </div>
    </div>

    <main class="page-fill">
      <section aria-labelledby="map-section-title">
        <div class="wrap">
          <div class="section-head">
            <div class="head-left">
              <span class="kicker">Locations</span>
              <h2 id="map-section-title">진행 중인 프로젝트</h2>
            </div>
            <p>
              핀을 누르면 위치 카드가 열리고, "자세히 보기"로 변경 전·후
              상세를 확인할 수 있습니다.
            </p>
          </div>

          <div class="map-shell">
            <div id="map" role="presentation" aria-label="프로젝트 위치 지도"></div>
          </div>

          <p class="map-legend">
            지도 데이터 © <a
              href="https://www.openstreetmap.org/copyright"
              target="_blank"
              rel="noopener noreferrer"
              >OpenStreetMap</a
            > 기여자.
          </p>
        </div>
      </section>
    </main>

    <footer>
      <div class="wrap footer-inner">
        <span>© 행로 · Hangro Studio</span>
        <span>빈 공간 · 지역성 · 관광 콘텐츠</span>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/places-runtime.js"></script>
    <script>
      if (window.HAENG_RUNTIME && typeof HAENG_RUNTIME.initMapPage === "function") {
        HAENG_RUNTIME.initMapPage({ mapElId: "map" });
      }
    </script>
  </body>
</html>
