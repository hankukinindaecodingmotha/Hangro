<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>숙소 목록 — 회사 · 행로</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
        <link rel="stylesheet" href="../css/portal.css" />
    <link rel="stylesheet" href="../css/portal-company.css" />
  </head>
  <body class="sub portal portal-company">
    <header>
      <div class="wrap nav">
        <a href="./" class="logo">행로 운영</a>
                <nav class="nav-links" aria-label="운영 메뉴">
          <a href="./">운영</a>
          <a href="../guest/" target="_blank" rel="noopener noreferrer">게스트 화면 ↗</a>
          <a href="../host/" target="_blank" rel="noopener noreferrer">집주인 화면 ↗</a>
        </nav>
        <a class="nav-cta" href="../archive.html">기록</a>
      </div>
    </header>
    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Company</p>
        <h1>숙소 목록</h1>
        <p>전체 등록 숙소와 담당 집주인·상태입니다.</p>
      </div>
    </div>
    <main class="page-fill">
      <nav class="portal-subnav wrap">
        <a href="./">대시보드</a>
        <a href="properties.html" aria-current="page">숙소</a>
        <a href="bookings.html">예약</a>
        <a href="messages.html">문의</a>
        <a href="content.html">공지·콘텐츠</a>
      </nav>
      <div class="wrap">
        <div class="portal-table-wrap">
          <table class="portal-table">
            <thead>
              <tr>
                <th>숙소</th>
                <th>집주인</th>
                <th>상태</th>
                <th>주소</th>
              </tr>
            </thead>
            <tbody id="company-properties-body"></tbody>
          </table>
        </div>
      </div>
    </main>
    <footer>
      <div class="wrap footer-inner">
        <span>© 행로 · Hangro Studio</span>
        <span>회사</span>
      </div>
    </footer>
    <script src="../js/portal-data.js"></script>
    <script src="../js/portal-ui.js"></script>
    <script>
      (function () {
        var D = window.PORTAL_DATA;
        var U = window.PortalUI;
        document.getElementById("company-properties-body").innerHTML = D.properties
          .map(function (p) {
            return (
              "<tr><td>" +
              U.escapeHtml(p.name) +
              "</td><td>" +
              U.escapeHtml(p.hostId) +
              "</td><td>" +
              U.statusBadge(p.status) +
              "</td><td>" +
              U.escapeHtml(p.address) +
              "</td></tr>"
            );
          })
          .join("");
      })();
    </script>
  </body>
</html>
