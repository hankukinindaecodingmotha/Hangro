    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/company-unified.css" />
    <link rel="stylesheet" href="../css/portal.css" />
  </head>
  <body class="sub portal">
        <header>
      <div class="wrap nav company-nav">
        <a href="index.html" class="logo">행로</a>
        <nav class="nav-links" aria-label="행로 · 회사">
          <a href="index.html">소개</a>
          <a href="map-demo.html">지도</a>
          <a href="archive.html">기록</a>

          <a href="../guest/" target="_blank" rel="noopener noreferrer">게스트</a>
          <a href="../host/" target="_blank" rel="noopener noreferrer">집주인</a>
        </nav>
        <a class="nav-cta" href="booking.html">상담 예약</a>
      </div>
    </header>
    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Company</p>
        <h1>공지·콘텐츠</h1>
        <p>운영 공지와 공개 콘텐츠(기록·장소 데이터)를 관리합니다.</p>
      </div>
    </div>
    <main class="page-fill">
      <nav class="portal-subnav wrap">
        <a href="dashboard.html">대시보드</a>
        <a href="properties.html">숙소</a>
        <a href="bookings.html">예약</a>
        <a href="messages.html">문의</a>
        <a href="content.html" aria-current="page">공지·콘텐츠</a>
      </nav>
      <div class="wrap">
        <h2 class="portal-section-title">운영 공지</h2>
        <div id="company-notices" class="portal-card"></div>
        <h2 class="portal-section-title" style="margin-top: 2rem">외부·저장소 연동</h2>
        <ul class="portal-list portal-card" style="padding: 1rem 1.25rem">
          <li><a href="archive.html">작업 기록 (archive)</a><span class="meta">GitHub Pages · places.json 기반</span></li>
          <li><a href="index.html">공개 랜딩</a><span class="meta">소개·예약 문의</span></li>
          <li><a href="../data/places.json">places.json</a><span class="meta">장소·기록 데이터 (읽기)</span></li>
        </ul>
        <form class="portal-form" style="margin-top: 2rem" id="company-notice-form">
          <label for="notice-title">새 공지 제목 (데모)</label>
          <input id="notice-title" name="title" type="text" />
          <label for="notice-body">내용</label>
          <textarea id="notice-body" name="body"></textarea>
          <button type="submit" class="btn btn-primary">등록 (데모)</button>
        </form>
        <p id="portal-form-note" hidden style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem"></p>
      </div>
    </main>
    <footer>
      <div class="wrap footer-inner">
        <span>© 행로 · Hangro Studio</span>
        <span>회사</span>
      </div>
    </footer>
    <script src="../js/portal-data.js"></script>
    <script src="../js/portal-ui.js"></script>
    <script>
      (function () {
        var D = window.PORTAL_DATA;
        var U = window.PortalUI;
        document.getElementById("company-notices").innerHTML =
          '<ul class="portal-list">' +
          D.notices
            .map(function (n) {
              return (
                "<li><strong>" +
                U.escapeHtml(n.title) +
                '</strong><span class="meta">' +
                U.escapeHtml(n.date) +
                "<br>" +
                U.escapeHtml(n.body) +
                "</span></li>"
              );
            })
            .join("") +
          "</ul>";
        document.getElementById("company-notice-form").addEventListener("submit", function (e) {
          e.preventDefault();
          var note = document.getElementById("portal-form-note");
          note.textContent = "데모: API·DB 연동 후 전체 포털에 공지가 반영됩니다.";
          note.hidden = false;
        });
      })();
    </script>
  </body>
</html>
