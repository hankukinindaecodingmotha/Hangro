<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="행로 — 빈집·유후시설 재생 작업 기록"
    />
    <title>기록 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/company-unified.css" />
    <style>
      #archive-root {
        display: flex;
        flex-direction: column;
        gap: clamp(2.75rem, 5.5vw, 3.75rem);
        margin-top: clamp(1.75rem, 3.5vw, 2.25rem);
      }

      .archive-card {
        scroll-margin-top: 5rem;
        display: flex;
        flex-direction: column;
        gap: clamp(1.25rem, 2.75vw, 1.6rem);
      }

      .archive-head {
        max-width: 56rem;
        display: flex;
        flex-direction: column;
        gap: 0.95rem;
        align-items: flex-start;
      }

      .status-pill {
        display: inline-block;
        font-family: "Helvetica Neue", system-ui, sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-mute, var(--text-muted, #87897d));
        padding: 0.2rem 0.65rem;
        border-radius: 999px;
        background: var(--paper, var(--bg-elevated, #f6f1e5));
        margin: 0;
      }

      .archive-head h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.45rem, 3.4vw, 2.1rem);
        margin: 0;
        letter-spacing: -0.025em;
        line-height: 1.25;
      }

      .archive-head .lead {
        margin: 0 0 0.85rem;
        color: var(--ink-soft, var(--text-muted, #4a4f44));
        font-size: 1rem;
        line-height: 1.7;
      }

      .archive-head .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .archive-head .tags li {
        font-family: "Helvetica Neue", system-ui, sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-mute, var(--text-muted, #87897d));
      }

      .archive-head .tags li + li::before {
        content: "·";
        margin-right: 0.4rem;
        color: var(--rule, rgba(0, 0, 0, 0.2));
      }

      .archive-bullets {
        padding: clamp(1.1rem, 3vw, 1.5rem);
        background: var(--paper, var(--bg-elevated, #f6f1e5));
        border-radius: var(--radius-lg, var(--radius, 12px));
        max-width: 56rem;
      }

      .archive-bullets h3 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 1.05rem;
        margin: 0 0 0.65rem;
        letter-spacing: -0.01em;
      }

      .archive-bullets ul {
        margin: 0;
        padding-left: 1.15rem;
        color: var(--ink-soft, var(--text-muted, #4a4f44));
        font-size: 0.94rem;
        line-height: 1.7;
      }

      .archive-actions {
        margin: 0;
        font-size: 0.88rem;
        color: var(--ink-mute, var(--text-muted, #87897d));
      }

      .archive-actions a {
        color: var(--ink, currentColor);
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px solid currentColor;
        padding-bottom: 1px;
      }

      .archive-actions a:hover {
        opacity: 0.7;
      }

      .archive-story-block {
        max-width: 56rem;
        padding: clamp(1.1rem, 2.8vw, 1.5rem) 0 clamp(0.15rem, 0.8vw, 0.35rem);
      }

      .archive-story-eyebrow {
        font-family: "Helvetica Neue", system-ui, sans-serif;
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-mute, var(--text-muted, #87897d));
        margin: 0 0 0.55rem;
      }

      .archive-story-title {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.2rem, 2.8vw, 1.55rem);
        margin: 0 0 0.95rem;
        letter-spacing: -0.025em;
        line-height: 1.28;
        color: var(--ink, currentColor);
      }

      .archive-story-p {
        margin: 0 0 0.95rem;
        font-size: 0.98rem;
        line-height: 1.78;
        color: var(--ink-soft, var(--text-muted, #4a4f44));
      }

      .archive-story-shifts {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        margin: 0 0 1.35rem;
      }

      .archive-story-shift {
        display: grid;
        grid-template-columns: 4.25rem 1fr;
        gap: 0.5rem 1rem;
        align-items: center;
        padding: 0.95rem 1.05rem;
        background: var(--paper, var(--bg-elevated, #f6f1e5));
        border-radius: var(--radius-lg, var(--radius, 12px));
        border: 1px solid var(--rule-soft, rgba(0, 0, 0, 0.06));
      }

      @media (max-width: 520px) {
        .archive-story-shift {
          grid-template-columns: 1fr;
        }

        .archive-story-space {
          padding-top: 0;
        }
      }

      .archive-story-space {
        font-family: "Nanum Myeongjo", serif;
        font-size: 0.92rem;
        font-weight: 700;
        color: var(--ink, currentColor);
        padding-top: 0.12rem;
      }

      .archive-story-shift-body {
        min-width: 0;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem 0.75rem;
      }

      .archive-story-lbl {
        display: inline-block;
        min-width: 2.35rem;
        font-family: "Helvetica Neue", system-ui, sans-serif;
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-mute, var(--text-muted, #87897d));
        margin-right: 0.3rem;
      }

      .archive-story-before,
      .archive-story-after {
        margin: 0;
        flex: 1 1 9rem;
        min-width: 0;
        font-size: 0.9rem;
        line-height: 1.55;
        color: var(--ink-soft, var(--text-muted, #4a4f44));
      }

      .archive-story-arrow {
        margin: 0;
        flex: 0 0 auto;
        line-height: 1;
        font-size: 1rem;
        font-weight: 600;
        color: var(--green-deep, #3d6e2c);
      }

      .archive-story-after .archive-story-lbl {
        color: var(--green-deep, #3d6e2c);
      }

      .archive-story-concept {
        padding: 1.05rem 1.15rem 1.15rem;
        background: color-mix(
          in srgb,
          var(--green-soft, #b7c9a4) 24%,
          var(--paper, #f6f1e5)
        );
        border-radius: var(--radius-lg, var(--radius, 12px));
        border: 1px solid var(--rule-soft, rgba(0, 0, 0, 0.06));
      }

      .archive-story-concept h3 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 1rem;
        margin: 0 0 0.55rem;
        letter-spacing: -0.02em;
        color: var(--ink, currentColor);
      }

      .archive-story-concept ul {
        margin: 0;
        padding-left: 1.1rem;
        font-size: 0.91rem;
        line-height: 1.68;
        color: var(--ink-soft, var(--text-muted, #4a4f44));
      }

      .archive-pair-section {
        max-width: 56rem;
      }

      .archive-pair-section h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.15rem, 2.6vw, 1.45rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }

      .archive-pair-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 1rem;
        margin: 0 0 1rem;
        font-size: 0.82rem;
        color: var(--ink-soft, var(--text-muted, #4a4f44));
      }

      .archive-pair-toolbar label {
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.72rem;
        color: var(--ink-mute, var(--text-muted, #87897d));
      }

      .archive-pair-select {
        font-family: inherit;
        font-size: 0.88rem;
        padding: 0.35rem 0.75rem;
        border: 1px solid var(--rule, rgba(0, 0, 0, 0.12));
        border-radius: var(--radius, 8px);
        background: var(--paper, var(--bg-elevated, #f6f1e5));
        color: var(--ink, currentColor);
      }

      .archive-pair-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: clamp(0.75rem, 2vw, 1.25rem);
      }

      @media (max-width: 640px) {
        .archive-pair-grid {
          grid-template-columns: 1fr;
        }
      }

      .archive-pair-grid figure {
        margin: 0;
        background: var(--paper, var(--bg-elevated, #f6f1e5));
        border-radius: var(--radius-lg, var(--radius, 12px));
        overflow: hidden;
      }

      .archive-pair-cap {
        padding: 0.45rem 0.65rem;
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-mute, var(--text-muted, #87897d));
        border-bottom: 1px solid var(--rule-soft, rgba(0, 0, 0, 0.06));
      }

      .archive-pair-img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        background: rgba(0, 0, 0, 0.04);
      }

      .archive-pair-status {
        margin: 0.65rem 0 0;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        color: var(--ink-mute, var(--text-muted, #87897d));
      }
    </style>
  </head>
