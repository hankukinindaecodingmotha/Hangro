<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예약 전체 — 회사 · 행로</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/company-unified.css" />
    <link rel="stylesheet" href="../css/portal.css" />
  </head>
  <body class="sub portal">
        <header>
      <div class="wrap nav company-nav">
        <a href="index.html" class="logo">행로</a>
        <nav class="nav-links" aria-label="행로 · 회사">
          <a href="index.html">소개</a>
          <a href="map-demo.html">지도</a>
          <a href="archive.html">기록</a>
          <a href="booking.html">예약</a>
          <a href="team.html">팀</a>
          <a href="dashboard.html">운영</a>
          <a href="../guest/" target="_blank" rel="noopener noreferrer">게스트</a>
          <a href="../host/" target="_blank" rel="noopener noreferrer">집주인</a>
        </nav>
        <a class="nav-cta" href="booking.html">상담 예약</a>
      </div>
    </header>
    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Company</p>
        <h1>예약 전체</h1>
        <p>모든 숙소의 예약을 검색·확인합니다.</p>
      </div>
    </div>
    <main class="page-fill">
      <nav class="portal-subnav wrap">
        <a href="dashboard.html">대시보드</a>
        <a href="properties.html">숙소</a>
        <a href="bookings.html" aria-current="page">예약</a>
        <a href="messages.html">문의</a>
        <a href="content.html">공지·콘텐츠</a>
      </nav>
      <div class="wrap">
        <div class="portal-table-wrap">
          <table class="portal-table">
            <thead>
              <tr>
                <th>게스트</th>
                <th>숙소</th>
                <th>일정</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="company-bookings-body"></tbody>
          </table>
        </div>
      </div>
    </main>
    <footer>
      <div class="wrap footer-inner">
        <span>© 행로 · Hangro Studio</span>
        <span>회사</span>
      </div>
    </footer>
    <script src="../js/portal-data.js"></script>
    <script src="../js/portal-ui.js"></script>
    <script>
      (function () {
        var D = window.PORTAL_DATA;
        var U = window.PortalUI;
        document.getElementById("company-bookings-body").innerHTML = D.bookings
          .map(function (b) {
            var p = D.getProperty(b.propertyId);
            return (
              "<tr><td>" +
              U.escapeHtml(b.guestName) +
              "</td><td>" +
              U.escapeHtml(p ? p.name : "") +
              "</td><td>" +
              U.formatDateRange(b.checkIn, b.checkOut) +
              "</td><td>" +
              U.statusBadge(b.status) +
              "</td></tr>"
            );
          })
          .join("");
      })();
    </script>
  </body>
</html>
