<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="행로 — 게스트·집주인·운영 포털" />
    <title>행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/portal.css" />
    <style>
      .gate {
        min-height: 70vh;
        display: flex;
        align-items: center;
        padding: clamp(3rem, 8vw, 5rem) 0;
      }
      .gate h1 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.85rem, 4.5vw, 2.75rem);
        margin: 0 0 0.75rem;
        letter-spacing: -0.03em;
      }
      .gate-lead {
        color: var(--text-muted);
        max-width: 36ch;
        margin: 0 0 2rem;
        line-height: 1.75;
      }
      .gate-cards {
        display: grid;
        gap: 1rem;
      }
      @media (min-width: 640px) {
        .gate-cards {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      .gate-card {
        display: block;
        padding: 1.35rem 1.25rem;
        border-radius: var(--radius);
        border: 1px solid var(--line);
        background: var(--bg-elevated);
        text-decoration: none;
        color: var(--text);
        transition: border-color 0.15s ease, transform 0.15s ease;
      }
      .gate-card:hover {
        border-color: var(--accent);
        text-decoration: none;
        transform: translateY(-2px);
      }
      .gate-card strong {
        display: block;
        font-size: 1.05rem;
        margin-bottom: 0.35rem;
      }
      .gate-card span {
        font-size: 0.88rem;
        color: var(--text-muted);
        line-height: 1.55;
      }
      .gate-card--company {
        border-color: color-mix(in srgb, var(--accent) 40%, var(--line));
      }
    </style>
  </head>
  <body class="sub portal">
    <main class="gate">
      <div class="wrap">
        <p class="badge">Hangro</p>
        <h1>행로에 오신 것을 환영합니다</h1>
        <p class="gate-lead">
          이용하시는 분, 공간을 내어주시는 분, 운영·소개를 보시는 분에 맞는 화면으로
          이동해 주세요.
        </p>
        <div class="gate-cards">
          <a class="gate-card" href="guest/">
            <strong>게스트</strong>
            <span>예약·숙소 안내·문의 — 머무름</span>
          </a>
          <a class="gate-card" href="host/">
            <strong>집주인</strong>
            <span>숙소·예약·문의함 — 집터</span>
          </a>
          <a class="gate-card gate-card--company" href="company/">
            <strong>회사 · 소개</strong>
            <span>소개·지도·기록·팀·운영</span>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
