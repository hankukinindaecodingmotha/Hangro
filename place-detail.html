<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="행로 — 프로젝트별 공간 재생 소개" />
    <title>공간 소개 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .detail-back {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-muted);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        margin-bottom: 1rem;
      }

      .detail-back:hover {
        color: var(--accent);
        text-decoration: none;
      }

      .detail-intro {
        max-width: 44rem;
      }

      .detail-intro h1 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.6rem, 4vw, 2.25rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.03em;
      }

      .detail-intro .lead {
        margin: 0 0 0.75rem;
        color: var(--text-muted);
        font-size: 1.05rem;
      }

      .detail-intro .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .detail-intro .tags li {
        font-family: "Helvetica Neue", system-ui, sans-serif;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-mute);
        padding: 0;
      }

      .detail-intro .tags li + li::before {
        content: "·";
        margin: 0 0.85rem 0 0.15rem;
        color: var(--ink-mute);
      }

      .ba-section {
        margin-top: clamp(2rem, 5vw, 3rem);
      }

      .ba-section h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.25rem, 2.8vw, 1.65rem);
        margin: 0 0 0.75rem;
      }

      .ba-section > .hint {
        margin: 0 0 1.25rem;
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      /* 상세: 변경 전·후를 2열 그리드, 각 열 안 사진도 2열 */
      .detail-compare-grid {
        display: grid;
        gap: clamp(1.5rem, 3.5vw, 2.75rem);
        margin-top: 0.35rem;
      }

      @media (min-width: 800px) {
        .detail-compare-grid {
          grid-template-columns: 1fr 1fr;
          align-items: start;
        }

        .detail-compare-grid > .ba-photos-section--grid:only-child {
          grid-column: 1 / -1;
        }
      }

      .ba-photos-section--grid > h2 {
        margin-bottom: 0.85rem;
      }

      .ba-photos-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem 0.75rem;
      }

      .ba-photos-section--grid .ba-photo {
        margin: 0;
      }

      .ba-photos-section--grid .ba-photo img {
        aspect-ratio: 4 / 3;
        border-radius: var(--radius-lg);
      }

      .ba-grid {
        display: grid;
        gap: 1.25rem;
      }

      @media (min-width: 720px) {
        .ba-grid {
          grid-template-columns: 1fr 1fr;
          align-items: start;
        }
      }

      .ba-card {
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: var(--paper);
      }

      .ba-card figcaption {
        padding: 0.95rem 1.1rem 0.5rem;
        font-family: "Helvetica Neue", system-ui, sans-serif;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-mute);
        background: transparent;
      }

      .ba-card p {
        margin: 0;
        padding: 0.85rem 1rem 1rem;
        font-size: 0.9rem;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .facade {
        aspect-ratio: 4 / 3;
        position: relative;
        overflow: hidden;
      }

      .facade::before,
      .facade::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      /* 창문 패턴 */
      .facade-windows {
        position: absolute;
        inset: 12% 10% 18%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 10%;
        opacity: 0.88;
      }

      .win {
        border-radius: 1px;
      }

      /* 변경 전 — 차분한 베이지·회갈 단색 */
      .facade--before {
        background: #C6BBA3;
      }

      .facade--before .win {
        background: #6F6450;
        opacity: 0.55;
      }

      /* 변경 후 — 차분한 세이지 그린 단색 */
      .facade--after {
        background: #B7C9A4;
      }

      .facade--after .win {
        background: var(--bg);
        border: 1px solid rgba(26, 36, 25, 0.35);
      }

      .detail-story {
        margin-top: clamp(2rem, 5vw, 3rem);
        padding: clamp(1.5rem, 3vw, 2rem);
        border-radius: var(--radius-lg);
        background: var(--paper);
        max-width: 44rem;
      }

      .detail-story h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 1.2rem;
        margin: 0 0 0.75rem;
      }

      .detail-story ul {
        margin: 0;
        padding-left: 1.15rem;
        color: var(--text-muted);
        font-size: 0.92rem;
        line-height: 1.65;
      }

      .unknown-box {
        background: var(--paper);
        border-radius: var(--radius-lg);
        padding: 2rem;
        text-align: center;
        color: var(--ink-mute);
        margin-top: 2rem;
      }

      .unknown-box a {
        font-weight: 600;
      }

      .floor-svg-shell {
        border-radius: var(--radius-lg);
        background: var(--paper);
        padding: 0.85rem;
        overflow: auto;
        max-width: 100%;
      }

      .floor-svg {
        display: block;
        width: min(100%, 520px);
        height: auto;
        margin: 0 auto;
      }

      .floor-hit {
        cursor: pointer;
        outline: none;
      }

      .floor-hit:hover rect,
      .floor-hit:hover ellipse {
        filter: brightness(1.15);
      }

      .floor-hit:focus-visible rect,
      .floor-hit:focus-visible ellipse {
        stroke: var(--accent);
        stroke-width: 2.2;
      }

      .floor-label {
        text-shadow: 0 1px 2px rgba(26, 36, 25, 0.45);
      }

      .floor-dialog {
        max-width: 22rem;
        width: calc(100% - 2rem);
        border: none;
        border-radius: var(--radius-lg);
        padding: 0;
        background: var(--paper);
        color: var(--ink);
        box-shadow: 0 12px 36px rgba(26, 36, 25, 0.18);
      }

      .floor-dialog::backdrop {
        background: rgba(26, 36, 25, 0.35);
      }

      .floor-dialog-form {
        padding: 1.25rem 1.35rem 1.35rem;
        margin: 0;
      }

      .floor-dialog h3 {
        margin: 0 0 0.65rem;
        font-size: 1.1rem;
        font-family: "Nanum Myeongjo", serif;
      }

      .floor-dialog-body {
        margin: 0 0 1.25rem;
        font-size: 0.92rem;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .floor-dialog-close {
        width: 100%;
      }

      .ba-photos {
        margin-top: 1.75rem;
        max-width: 380px;
        margin-left: auto;
        margin-right: auto;
      }


      .ba-photos-frame {
        position: relative;
      }

      .ba-photos-track {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        border-radius: var(--radius-lg);
        background: var(--bg-elevated);
      }

      .ba-photos-track::-webkit-scrollbar {
        display: none;
      }

      .ba-photos-track:focus {
        outline: 2px solid var(--accent, currentColor);
        outline-offset: 3px;
      }

      .ba-photo {
        flex: 0 0 100%;
        scroll-snap-align: start;
        margin: 0;
      }

      .ba-photo img {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: rgba(0, 0, 0, 0.05);
      }

      .ba-photos-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 2.5rem;
        height: 2.5rem;
        background: var(--ink);
        color: var(--bg);
        border: 1px solid var(--ink);
        border-radius: 999px;
        cursor: pointer;
        font-size: 0;
        line-height: 1;
        padding: 0;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.18s ease, transform 0.18s ease;
      }

      .ba-photos-btn::before {
        content: "";
        display: block;
        width: 0.7rem;
        height: 0.7rem;
        border-top: 1.5px solid var(--bg);
        border-right: 1.5px solid var(--bg);
      }

      .ba-photos-prev::before {
        transform: rotate(-135deg);
        margin-left: 4px;
      }

      .ba-photos-next::before {
        transform: rotate(45deg);
        margin-right: 4px;
      }

      .ba-photos-btn:hover:not(:disabled) {
        background: var(--paper);
        color: var(--ink);
      }

      .ba-photos-btn:hover:not(:disabled)::before {
        border-top-color: var(--ink);
        border-right-color: var(--ink);
      }

      .ba-photos-btn:active:not(:disabled) {
        transform: translateY(-50%) scale(0.96);
      }

      .ba-photos-btn:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }

      .ba-photos-prev {
        left: 0.85rem;
      }

      .ba-photos-next {
        right: 0.85rem;
      }

      .ba-photos-status {
        margin: 0.7rem 0 0;
        text-align: center;
        font-family: "Helvetica Neue", system-ui, sans-serif;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--ink-mute);
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .status-line {
        margin: 0 0 0.6rem;
      }

      .status-pill {
        display: inline-block;
        font-family: "Helvetica Neue", system-ui, sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-mute);
        padding: 0.2rem 0.55rem;
        border: 1px solid var(--rule);
        border-radius: 999px;
        background: var(--paper);
      }

      .detail-after-pending {
        margin-top: clamp(2rem, 5vw, 3rem);
        padding: clamp(1.5rem, 4vw, 2.25rem);
        background: var(--paper);
        border-radius: var(--radius-lg, var(--radius));
        max-width: 44rem;
      }

      .detail-after-pending h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.15rem, 2.4vw, 1.45rem);
        margin: 0 0 0.75rem;
        letter-spacing: -0.02em;
      }

      .detail-after-pending p {
        margin: 0;
        color: var(--ink-soft);
        line-height: 1.7;
      }

      .detail-actions {
        margin-top: 2rem;
        font-size: 0.88rem;
        color: var(--ink-mute);
      }

      .detail-actions a {
        color: var(--ink);
      }
    </style>
  </head>
