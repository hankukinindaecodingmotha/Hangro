<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="행로 프로젝트별 공간 재생 소개 — 테스트 페이지" />
    <title>공간 소개 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .detail-back {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-muted);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        margin-bottom: 1rem;
      }

      .detail-back:hover {
        color: var(--accent);
        text-decoration: none;
      }

      .detail-intro {
        max-width: 44rem;
      }

      .detail-intro h1 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.6rem, 4vw, 2.25rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.03em;
      }

      .detail-intro .lead {
        margin: 0 0 0.75rem;
        color: var(--text-muted);
        font-size: 1.05rem;
      }

      .detail-intro .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .detail-intro .tags li {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--accent);
        background: var(--accent-soft);
        border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
        padding: 0.28rem 0.65rem;
        border-radius: 999px;
      }

      .ba-section {
        margin-top: clamp(2rem, 5vw, 3rem);
      }

      .ba-section h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.25rem, 2.8vw, 1.65rem);
        margin: 0 0 0.75rem;
      }

      .ba-section > .hint {
        margin: 0 0 1.25rem;
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .ba-grid {
        display: grid;
        gap: 1.25rem;
      }

      @media (min-width: 720px) {
        .ba-grid {
          grid-template-columns: 1fr 1fr;
          align-items: start;
        }
      }

      .ba-card {
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) + 2px);
        overflow: hidden;
        background: var(--bg-elevated);
      }

      .ba-card figcaption {
        padding: 0.75rem 1rem;
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--text);
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--bg) 55%, var(--bg-elevated));
      }

      .ba-card p {
        margin: 0;
        padding: 0.85rem 1rem 1rem;
        font-size: 0.9rem;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .facade {
        aspect-ratio: 4 / 3;
        position: relative;
        overflow: hidden;
      }

      .facade::before,
      .facade::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      /* 창문 패턴 */
      .facade-windows {
        position: absolute;
        inset: 12% 10% 18%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 10%;
        opacity: 0.88;
      }

      .win {
        border-radius: 4px;
        border: 2px solid rgba(0, 0, 0, 0.35);
      }

      .facade--before {
        background: linear-gradient(
          165deg,
          #4a433d 0%,
          #2e2824 42%,
          #1c1916 100%
        );
      }

      .facade--before .win {
        background: linear-gradient(
          180deg,
          rgba(20, 18, 16, 0.85),
          rgba(35, 32, 28, 0.5)
        );
        box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.65);
      }

      .facade--before::after {
        inset: 0;
        background: repeating-linear-gradient(
          -12deg,
          transparent,
          transparent 6px,
          rgba(0, 0, 0, 0.06) 6px,
          rgba(0, 0, 0, 0.06) 7px
        );
        mix-blend-mode: multiply;
      }

      .facade--after {
        background: linear-gradient(
          165deg,
          #2d3d33 0%,
          #1e2a22 45%,
          #121a15 100%
        );
      }

      .facade--after .win {
        background: linear-gradient(
          180deg,
          rgba(107, 155, 122, 0.35),
          rgba(15, 20, 18, 0.55)
        );
        border-color: color-mix(in srgb, var(--accent) 55%, rgba(0, 0, 0, 0.4));
        box-shadow:
          0 0 20px rgba(107, 155, 122, 0.25),
          inset 0 0 8px rgba(107, 155, 122, 0.12);
      }

      .facade--after::before {
        inset: -30% -20%;
        background: radial-gradient(
          circle at 50% 20%,
          rgba(107, 155, 122, 0.18),
          transparent 55%
        );
      }

      .detail-story {
        margin-top: clamp(2rem, 5vw, 3rem);
        padding: clamp(1.25rem, 3vw, 1.75rem);
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) + 4px);
        background: var(--bg-elevated);
        max-width: 44rem;
      }

      .detail-story h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 1.2rem;
        margin: 0 0 0.75rem;
      }

      .detail-story ul {
        margin: 0;
        padding-left: 1.15rem;
        color: var(--text-muted);
        font-size: 0.92rem;
        line-height: 1.65;
      }

      .unknown-box {
        border: 1px dashed var(--line);
        border-radius: var(--radius);
        padding: 2rem;
        text-align: center;
        color: var(--text-muted);
        margin-top: 2rem;
      }

      .unknown-box a {
        font-weight: 600;
      }

      .floor-svg-shell {
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) + 2px);
        background: var(--bg);
        padding: 0.75rem;
        overflow: auto;
        max-width: 100%;
      }

      .floor-svg {
        display: block;
        width: min(100%, 520px);
        height: auto;
        margin: 0 auto;
      }

      .floor-hit {
        cursor: pointer;
        outline: none;
      }

      .floor-hit:hover rect,
      .floor-hit:hover ellipse {
        filter: brightness(1.15);
      }

      .floor-hit:focus-visible rect,
      .floor-hit:focus-visible ellipse {
        stroke: var(--accent);
        stroke-width: 2.2;
      }

      .floor-label {
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75);
      }

      .floor-dialog {
        max-width: 22rem;
        width: calc(100% - 2rem);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 0;
        background: var(--bg-elevated);
        color: var(--text);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      }

      .floor-dialog::backdrop {
        background: rgba(0, 0, 0, 0.55);
      }

      .floor-dialog-form {
        padding: 1.25rem 1.35rem 1.35rem;
        margin: 0;
      }

      .floor-dialog h3 {
        margin: 0 0 0.65rem;
        font-size: 1.1rem;
        font-family: "Nanum Myeongjo", serif;
      }

      .floor-dialog-body {
        margin: 0 0 1.25rem;
        font-size: 0.92rem;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .floor-dialog-close {
        width: 100%;
      }
    </style>
  </head>

    <main class="page-fill">

    <footer>

    </footer>

    <script src="js/places-runtime.js"></script>

  </body>
</html>
