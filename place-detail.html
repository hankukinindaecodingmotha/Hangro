<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="행로 매장별 공간 재생 소개 — 테스트 페이지" />
    <title>공간 소개 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .detail-back {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-muted);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        margin-bottom: 1rem;
      }

      .detail-back:hover {
        color: var(--accent);
        text-decoration: none;
      }

      .detail-intro {
        max-width: 44rem;
      }

      .detail-intro h1 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.6rem, 4vw, 2.25rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.03em;
      }

      .detail-intro .lead {
        margin: 0 0 0.75rem;
        color: var(--text-muted);
        font-size: 1.05rem;
      }

      .detail-intro .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .detail-intro .tags li {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--accent);
        background: var(--accent-soft);
        border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
        padding: 0.28rem 0.65rem;
        border-radius: 999px;
      }

      .ba-section {
        margin-top: clamp(2rem, 5vw, 3rem);
      }

      .ba-section h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: clamp(1.25rem, 2.8vw, 1.65rem);
        margin: 0 0 0.75rem;
      }

      .ba-section > .hint {
        margin: 0 0 1.25rem;
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .ba-grid {
        display: grid;
        gap: 1.25rem;
      }

      @media (min-width: 720px) {
        .ba-grid {
          grid-template-columns: 1fr 1fr;
          align-items: start;
        }
      }

      .ba-card {
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) + 2px);
        overflow: hidden;
        background: var(--bg-elevated);
      }

      .ba-card figcaption {
        padding: 0.75rem 1rem;
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--text);
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--bg) 55%, var(--bg-elevated));
      }

      .ba-card p {
        margin: 0;
        padding: 0.85rem 1rem 1rem;
        font-size: 0.9rem;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .facade {
        aspect-ratio: 4 / 3;
        position: relative;
        overflow: hidden;
      }

      .facade::before,
      .facade::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      /* 창문 패턴 */
      .facade-windows {
        position: absolute;
        inset: 12% 10% 18%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 10%;
        opacity: 0.88;
      }

      .win {
        border-radius: 4px;
        border: 2px solid rgba(0, 0, 0, 0.35);
      }

      .facade--before {
        background: linear-gradient(
          165deg,
          #4a433d 0%,
          #2e2824 42%,
          #1c1916 100%
        );
      }

      .facade--before .win {
        background: linear-gradient(
          180deg,
          rgba(20, 18, 16, 0.85),
          rgba(35, 32, 28, 0.5)
        );
        box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.65);
      }

      .facade--before::after {
        inset: 0;
        background: repeating-linear-gradient(
          -12deg,
          transparent,
          transparent 6px,
          rgba(0, 0, 0, 0.06) 6px,
          rgba(0, 0, 0, 0.06) 7px
        );
        mix-blend-mode: multiply;
      }

      .facade--after {
        background: linear-gradient(
          165deg,
          #2d3d33 0%,
          #1e2a22 45%,
          #121a15 100%
        );
      }

      .facade--after .win {
        background: linear-gradient(
          180deg,
          rgba(107, 155, 122, 0.35),
          rgba(15, 20, 18, 0.55)
        );
        border-color: color-mix(in srgb, var(--accent) 55%, rgba(0, 0, 0, 0.4));
        box-shadow:
          0 0 20px rgba(107, 155, 122, 0.25),
          inset 0 0 8px rgba(107, 155, 122, 0.12);
      }

      .facade--after::before {
        inset: -30% -20%;
        background: radial-gradient(
          circle at 50% 20%,
          rgba(107, 155, 122, 0.18),
          transparent 55%
        );
      }

      .detail-story {
        margin-top: clamp(2rem, 5vw, 3rem);
        padding: clamp(1.25rem, 3vw, 1.75rem);
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) + 4px);
        background: var(--bg-elevated);
        max-width: 44rem;
      }

      .detail-story h2 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 1.2rem;
        margin: 0 0 0.75rem;
      }

      .detail-story ul {
        margin: 0;
        padding-left: 1.15rem;
        color: var(--text-muted);
        font-size: 0.92rem;
        line-height: 1.65;
      }

      .unknown-box {
        border: 1px dashed var(--line);
        border-radius: var(--radius);
        padding: 2rem;
        text-align: center;
        color: var(--text-muted);
        margin-top: 2rem;
      }

      .unknown-box a {
        font-weight: 600;
      }
    </style>
  </head>
  <body class="sub">
    <header>
      <div class="wrap nav">
        <a href="index.html" class="logo"
          ><img
            src="assets/haengro-logo.png"
            alt="행로"
            width="846"
            height="384"
            decoding="async"
        /></a>
        <nav class="nav-links" aria-label="주요 메뉴">
          <a href="index.html">소개</a>
          <a href="team.html">직원 소개</a>
          <a href="booking.html">예약</a>
        </nav>
        <a class="nav-cta" href="map-demo.html">지도 보기</a>
      </div>
    </header>

    <div class="page-hero">
      <div class="wrap">
        <a class="detail-back" href="map-demo.html">← 지도로 돌아가기</a>
        <div class="detail-intro" id="detail-root">
          <!-- JS renders -->
        </div>
      </div>
    </div>

    <main class="page-fill">
      <div class="wrap" id="detail-main"></div>
    </main>

    <footer>
      <div class="wrap footer-inner">
        <span>© 행로 (테스트 페이지)</span>
        <span>실제 사진으로 교체 시 before/after 이미지 컴포넌트만 갈아 끼우면 됩니다</span>
      </div>
    </footer>

    <script>
      (function () {
        var PLACES = {
          "sakjeon-hanok": {
            title: "남산 골목 한옥 게스트하우스",
            lead:
              "10년 넘게 비어 있던 단독 한옥을 지역 놀이·민화 이야기를 담은 체류형 숙소로 재구성한 예시입니다.",
            tags: ["빈집", "한옥", "게스트하우스"],
            beforeCaption: "변경 전 · 장기 공실",
            afterCaption: "변경 후 · 지역 테마 숙소",
            beforeText:
              "창호와 마루 상태가 불량하고 난방 비용 부담으로 임차인을 구하지 못한 상태였습니다.",
            afterText:
              "보존 구역 준준수 리모델링으로 마루 높이·동선만 손 보고, 민속놀이 체험 테마로 방 3실과 공동 거실을 열었습니다. (데모 비주얼)",
            bullets: [
              "지역예술인 협업: 한지 조명 · 세자 컬러 패브릭",
              "숙박 브랜드 스토리: ‘골목 기록자’ 패키지 (아카이빙 체험)",
            ],
          },
          "byeolmun-mill": {
            title: "한강변 제분 공장 카페 스테이",
            lead:
              "폐업 후 방치된 소규모 제분 시설 리드를 생산·판매 기능은 걷어내고, 창고 층고를 살려 스테이+카페로 바꾼 데모 케이스입니다.",
            tags: ["유후시설", "제분소", "복합 리유즈"],
            beforeCaption: "변경 전 · 유후 산업 시설",
            afterCaption: "변경 후 · 숙소 + 로스팅 카페",
            beforeText:
              "설비 철거만 되고 빈 골조에 잡초와 누수가 있던 상태. 소음·진동 규제가 남아 있어 용도 변경 검토가 필요했습니다.",
            afterText:
              "1층은 로컬 로스팅 카페, 2층은 이층침대형 도미토리형 스테이. 외관은 원형 사일로 형태만 남겨 간판 없이 브랜드 실루엣으로 인지되게 했습니다. (데모 비주얼)",
            bullets: [
              "한강 라이더·패들보드 이용객 타깃 ‘새벽 오픈’ 카페",
              "건축·소방 허용 범위는 실제 과제로 교체해야 합니다",
            ],
          },
        };

        function winGrid() {
          return (
            '<div class="facade-windows" aria-hidden="true">' +
            "<span class=\"win\"></span><span class=\"win\"></span><span class=\"win\"></span>" +
            "<span class=\"win\"></span><span class=\"win\"></span><span class=\"win\"></span>" +
            "</div>"
          );
        }

        function renderPlace(id) {
          var data = PLACES[id];
          var root = document.getElementById("detail-root");
          var main = document.getElementById("detail-main");
          document.title =
            (data ? data.title : "공간을 찾을 수 없음") + " — 행로";

          if (!data) {
            root.innerHTML =
              "<h1>알 수 없는 장소</h1><p class=\"lead\">링크가 잘못되었거나 아직 등록되지 않은 핀입니다.</p>";
            main.innerHTML =
              '<div class="unknown-box">' +
              "<p style=\"margin:0 0 1rem\">지도에서 핀을 골라 다시 들어와 주세요.</p>" +
              '<a href="map-demo.html">지도 데모로 이동</a>' +
              "</div>";
            return;
          }

          var tagsHtml = data.tags
            .map(function (t) {
              return "<li>" + escapeHtml(t) + "</li>";
            })
            .join("");

          root.innerHTML =
            "<h1>" +
            escapeHtml(data.title) +
            "</h1>" +
            "<p class=\"lead\">" +
            escapeHtml(data.lead) +
            "</p>" +
            "<ul class=\"tags\">" +
            tagsHtml +
            "</ul>";

          main.innerHTML =
            '<section class="ba-section" aria-labelledby="ba-heading">' +
            '<h2 id="ba-heading">공간 변화</h2>' +
            '<p class="hint">실제 서비스에서는 촬영한 사진·3D 워크스루 영상 등으로 교체하면 됩니다. 아래는 레이아웃용 데모 그래픽입니다.</p>' +
            '<div class="ba-grid">' +
            '<figure class="ba-card">' +
            "<figcaption>" +
            escapeHtml(data.beforeCaption) +
            "</figcaption>" +
            '<div class="facade facade--before">' +
            winGrid() +
            "</div>" +
            "<p>" +
            escapeHtml(data.beforeText) +
            "</p>" +
            "</figure>" +
            '<figure class="ba-card">' +
            "<figcaption>" +
            escapeHtml(data.afterCaption) +
            "</figcaption>" +
            '<div class="facade facade--after">' +
            winGrid() +
            "</div>" +
            "<p>" +
            escapeHtml(data.afterText) +
            "</p>" +
            "</figure>" +
            "</div>" +
            "</section>" +
            '<section class="detail-story" aria-labelledby="story-heading">' +
            '<h2 id="story-heading">프로그램 · 운영 포인트</h2>' +
            "<ul>" +
            data.bullets
              .map(function (b) {
                return "<li>" + escapeHtml(b) + "</li>";
              })
              .join("") +
            "</ul>" +
            "</section>" +
            '<p style="margin-top:2rem;font-size:0.88rem;color:var(--text-muted)">' +
            '<a href="booking.html">이런 프로젝트 상담 예약</a> · ' +
            '<a href="map-demo.html">다른 핀 보기</a>' +
            "</p>";
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        var params = new URLSearchParams(window.location.search);
        var id = params.get("id") || "";
        renderPlace(id);
      })();
    </script>
  </body>
</html>
