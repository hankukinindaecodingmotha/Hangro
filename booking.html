<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="행로 상담 및 방문 예약 — 빈 공간 재생 프로젝트 문의"
    />
    <title>예약 · 상담 — 행로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="sub">
    <header>
      <div class="wrap nav">
        <a href="index.html" class="logo">행로</a>
        <nav class="nav-links" aria-label="주요 메뉴">
          <a href="index.html">소개</a>
          <a href="map-demo.html">지도</a>
          <a href="archive.html">기록</a>
          <a href="booking.html" aria-current="page">예약</a>
          <a href="team.html">팀</a>
        </nav>
        <a class="nav-cta" href="booking.html">상담 예약</a>
      </div>
    </header>

    <div class="page-hero">
      <div class="wrap">
        <p class="badge">Booking · 상담 예약</p>
        <h1>공간을 함께 다시 켜시겠어요?</h1>
        <p>
          아래 양식을 보내주시면 영업일 기준 2일 이내 회신 드립니다.
          빈 공간·유후 시설·지자체 협업 모두 환영합니다.
        </p>
      </div>
    </div>

    <main class="page-fill">
      <section aria-labelledby="form-title">
        <div class="wrap">
          <div class="form-panel">
            <h2 id="form-title">상담 신청</h2>
            <p class="form-note">
              필수 항목(*)을 입력한 뒤 보내기를 눌러 주세요. 작성하신 내용은
              회신 용도로만 사용됩니다.
            </p>

            <form class="booking-form" id="booking-form" novalidate>
              <div class="field-row">
                <div class="field">
                  <label for="name">이름 <span aria-hidden="true">*</span></label>
                  <input
                    id="name"
                    name="name"
                    type="text"
                    autocomplete="name"
                    required
                    placeholder="홍길동"
                  />
                </div>
                <div class="field">
                  <label for="phone"
                    >연락처 <span aria-hidden="true">*</span></label
                  >
                  <input
                    id="phone"
                    name="phone"
                    type="tel"
                    autocomplete="tel"
                    required
                    placeholder="010-0000-0000"
                  />
                </div>
              </div>

              <div class="field">
                <label for="email">이메일</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="hello@example.com"
                />
                <p class="hint">선택 사항이지만, 안내 메일 발송 시 필요합니다.</p>
              </div>

              <div class="field-row">
                <div class="field">
                  <label for="date"
                    >희망 일자 <span aria-hidden="true">*</span></label
                  >
                  <input id="date" name="date" type="date" required />
                </div>
                <div class="field">
                  <label for="time">희망 시간대</label>
                  <select id="time" name="time">
                    <option value="">선택</option>
                    <option value="morning">오전 (10–12시)</option>
                    <option value="afternoon">오후 (14–17시)</option>
                    <option value="evening">저녁 (17–19시)</option>
                  </select>
                </div>
              </div>

              <div class="field">
                <label for="type"
                  >문의 유형 <span aria-hidden="true">*</span></label
                >
                <select id="type" name="type" required>
                  <option value="">선택</option>
                  <option value="space">빈집·유후 시설 상담</option>
                  <option value="gov">지자체 · 협업</option>
                  <option value="tour">관광·콘텐츠 제휴</option>
                  <option value="other">기타</option>
                </select>
              </div>

              <div class="field">
                <label for="message">요청 내용</label>
                <textarea
                  id="message"
                  name="message"
                  placeholder="지역, 대략적인 면적, 원하시는 방향 등을 적어 주세요."
                ></textarea>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">상담 신청 보내기</button>
                <p class="form-msg" id="form-msg" role="status" aria-live="polite"></p>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="wrap footer-inner">
        <span>© 행로 · Hangro Studio</span>
        <span>빈 공간 · 지역성 · 관광 콘텐츠</span>
      </div>
    </footer>

    <script>
      (function () {
        var form = document.getElementById("booking-form");
        var msg = document.getElementById("form-msg");
        if (!form || !msg) return;

        var busy = false;

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          if (busy) return;

          msg.textContent = "";
          msg.className = "form-msg";

          var btn = form.querySelector('button[type="submit"]');

          if (!form.checkValidity()) {
            form.reportValidity();
            msg.classList.add("err");
            msg.textContent = "필수 항목을 확인해 주세요.";
            return;
          }

          busy = true;
          if (btn) btn.disabled = true;

          try {
            var data = new FormData(form);
            var name = (data.get("name") || "").toString().trim();

            msg.classList.add("ok");
            msg.textContent =
              (name ? name + "님, " : "") +
              "상담 신청이 접수되었습니다. 영업일 기준 2일 이내 회신 드릴게요.";

            form.reset();
          } catch (err) {
            console.error("[행로 예약 폼]", err);
            msg.classList.add("err");
            msg.textContent = "처리 중 문제가 발생했습니다. 다시 시도해 주세요.";
          } finally {
            busy = false;
            if (btn) btn.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
